<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小欧 · 启发式数学老师</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9709;</text></svg>" />
</head>
<body>
  <div class="app">
    <!-- 侧边栏：设置 + 公理板 -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="24" cy="14" r="6"></circle>
            <path d="M18 20 L10 40"></path>
            <path d="M30 20 L38 40"></path>
            <path d="M10 40 L38 40"></path>
          </svg>
        </div>
        <div class="brand-text">
          <h1>小欧</h1>
          <p>陪你一起想数学</p>
        </div>
      </div>

      <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="探究模式">
        <button class="mode-btn active" data-mode="explore" role="tab">
          <span class="mode-title">一起探索</span>
          <span class="mode-sub">小欧出题</span>
        </button>
        <button class="mode-btn" data-mode="bring" role="tab">
          <span class="mode-title">带题来问</span>
          <span class="mode-sub">拍照/打字</span>
        </button>
      </div>

      <div class="panel">
        <label class="field">
          <span>孩子的名字（可留空）</span>
          <input id="childName" type="text" placeholder="例如：朵朵" maxlength="12" />
        </label>

        <label class="field">
          <span>今天想研究什么</span>
          <select id="topicSelect"></select>
        </label>

        <label class="field">
          <span>难度档位</span>
          <select id="levelSelect"></select>
        </label>

        <label class="field">
          <span>思考模式（DeepSeek / 通义）</span>
          <select id="thinkingSelect">
            <option value="off">关闭 · 回答更快</option>
            <option value="on">开启 · 显示思考过程（更慢）</option>
          </select>
        </label>
      </div>

      <div class="axioms">
        <div class="axioms-head">
          <span>本主题的几条公理</span>
          <small>其余一切都靠推导</small>
        </div>
        <ul id="axiomList"></ul>
      </div>

      <button id="exploreBtn" class="primary-btn">✨ 出个新题，开始探索</button>
      <button id="resetBtn" class="ghost-btn">开启新的探究</button>

      <footer class="sidebar-foot">
        <span id="modelTag" class="model-tag"></span>
      </footer>
    </aside>

    <!-- 主区：对话 -->
    <main class="chat">
      <div id="banner" class="banner hidden"></div>

      <div id="messages" class="messages" aria-live="polite"></div>

      <div class="composer">
        <div id="quickActions" class="quick-actions"></div>

        <div id="imgPreview" class="img-preview hidden">
          <img id="imgPreviewThumb" alt="待发送的题目照片" />
          <button id="imgRemoveBtn" class="img-remove" aria-label="移除照片">×</button>
          <span class="img-hint">这张题目会发给小欧，它会先陪你读题、再反问你，而不是直接给答案。</span>
        </div>

        <div class="input-row">
          <input id="fileInput" type="file" accept="image/*" capture="environment" hidden />
          <button id="attachBtn" class="icon-btn" aria-label="拍照或上传题目" title="拍照或上传作业本上的题目">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </button>
          <button id="drawBtn" class="icon-btn" aria-label="画板" title="打开画板，手写或画图发给小欧">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19l7-7 3 3-7 7-3 0z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle>
            </svg>
          </button>
          <button id="micBtn" class="icon-btn" aria-label="语音输入" title="按住说话，把你的想法说给小欧">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><path d="M12 17v5"></path>
            </svg>
          </button>
          <textarea id="input" rows="1" placeholder="把你的想法告诉小欧……（回车发送，Shift+回车换行）"></textarea>
          <button id="sendBtn" class="send-btn" aria-label="发送">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 2 11 13"></path>
              <path d="M22 2 15 22 11 13 2 9 22 2z"></path>
            </svg>
          </button>
        </div>
        <p class="tip">小欧不会直接给你答案，它会陪你一步步想出来。</p>
      </div>
    </main>
  </div>

  <!-- 画板 -->
  <div id="drawModal" class="draw-modal hidden">
    <div class="draw-sheet">
      <div class="draw-head">
        <span>画板 · 手写或画个图发给小欧</span>
        <div class="draw-tools">
          <button id="drawUndo" class="draw-tool" title="撤销">撤销</button>
          <button id="drawClear" class="draw-tool" title="清空">清空</button>
        </div>
      </div>
      <canvas id="drawCanvas" class="draw-canvas"></canvas>
      <div class="draw-actions">
        <button id="drawCancel" class="ghost-btn">取消</button>
        <button id="drawSend" class="primary-btn">发送给小欧</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="/app.js"></script>
</body>
</html>
